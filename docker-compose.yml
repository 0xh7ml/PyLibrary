version: "3.9"

services:
  web:
    build: .
    expose:
      - "8000"
    volumes:
      - static_files:/app/staticfiles

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/staticfiles
    depends_on:
      - web

volumes:
  static_files:
