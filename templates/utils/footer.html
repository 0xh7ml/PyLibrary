    </div>
    {% endif %}

        <a href="#" onclick="openContributorsModal(); return false;">View Contributors</a>

{% include "components/contributors_modal.html" %}

<script>
    function showWithBootstrap(modalElement) {
        if (!window.bootstrap || !window.bootstrap.Modal) {
            return false;
        }

        var ModalApi = window.bootstrap.Modal;
        if (typeof ModalApi.getOrCreateInstance === 'function') {
            ModalApi.getOrCreateInstance(modalElement).show();
            return true;
        }

        if (typeof ModalApi.getInstance === 'function') {
            var existing = ModalApi.getInstance(modalElement);
            if (existing && typeof existing.show === 'function') {
                existing.show();
                return true;
            }
        }

        var created = new ModalApi(modalElement);
        if (created && typeof created.show === 'function') {
            created.show();
            return true;
        }

        return false;
    }

    function hideWithBootstrap(modalElement) {
        if (!window.bootstrap || !window.bootstrap.Modal) {
            return false;
        }

        var ModalApi = window.bootstrap.Modal;
        if (typeof ModalApi.getInstance === 'function') {
            var existing = ModalApi.getInstance(modalElement);
            if (existing && typeof existing.hide === 'function') {
                existing.hide();
                return true;
            }
        }

        return false;
    }

    function openContributorsModal() {
        var modalElement = document.getElementById('contributorsModal');
        if (!modalElement) {
            return;
        }

        if (showWithBootstrap(modalElement)) {
            return;
        }

        if (window.jQuery && typeof window.jQuery.fn.modal === 'function') {
            window.jQuery(modalElement).modal('show');
            return;
        }

        modalElement.style.display = 'block';
        modalElement.classList.add('show');
    }

    function closeContributorsModal() {
        var modalElement = document.getElementById('contributorsModal');
        if (!modalElement) {
            return;
        }

        if (hideWithBootstrap(modalElement)) {
            return;
        }

        if (window.jQuery && typeof window.jQuery.fn.modal === 'function') {
            window.jQuery(modalElement).modal('hide');
            return;
        }

        modalElement.style.display = 'none';
        modalElement.classList.remove('show');
    }
</script>
