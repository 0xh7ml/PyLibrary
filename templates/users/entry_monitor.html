{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ APP_NAME }} - Entry Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        body {
            background-color: #f8f9fa;
            background-image: linear-gradient(rgba(248, 249, 250, 0.72), rgba(248, 249, 250, 0.72)), url("{% static 'img/IMG-20260418-WA0005.jpg' %}");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .iubat-corner-logo {
            position: fixed;
            top: 1rem;
            right: 1rem;
            width: 78px;
            height: auto;
            z-index: 1030;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .entry-card {
            max-width: 500px;
            width: 100%;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        }

        .logo-wrapper {
            width: 80px;
            height: 80px;
            /* background: linear-gradient(135deg, #007bff, #0056b3); */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
        }

        .form-control-lg {
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 1px;
        }

        /* Enhanced Toast customizations */
        .toast {
            min-width: 300px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            border-radius: 0.75rem;
            overflow: hidden;
            position: relative;
        }

        .toast-body {
            font-size: 0.95rem;
            line-height: 1.4;
            padding: 1rem;
        }

        /* Toast animations */
        .toast.show {
            transform: translateX(0) !important;
        }

        .toast:not(.show) {
            transform: translateX(100%);
        }

        /* Toast progress bar */
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .toast-progress-bar {
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            width: 100%;
            transform: translateX(-100%);
            transition: transform linear;
        }

        /* Toast container positioning */
        #toastContainer {
            max-height: 100vh;
            overflow-y: auto;
        }

        /* Toast type specific styles */
        .toast.bg-success .toast-progress-bar {
            background: rgba(255, 255, 255, 0.9);
        }

        .toast.bg-danger .toast-progress-bar {
            background: rgba(255, 255, 255, 0.9);
        }

        .toast.bg-warning .toast-progress-bar {
            background: rgba(0, 0, 0, 0.3);
        }

        .toast.bg-info .toast-progress-bar {
            background: rgba(255, 255, 255, 0.9);
        }

        @media (max-width: 576px) {
            .entry-card {
                margin: 1rem;
            }

            .iubat-corner-logo {
                width: 60px;
                top: 0.75rem;
                right: 0.75rem;
            }
            
            .toast {
                min-width: 280px;
            }
        }

        /* Entry monitor specific toast placement and size */
        #toastContainer.entry-monitor-toast {
            top: 1rem !important;
            left: 50% !important;
            right: auto !important;
            transform: translateX(-50%);
            padding: 0 !important;
        }

        #toastContainer.entry-monitor-toast .toast {
            min-width: 460px;
            border-radius: 1rem;
        }

        #toastContainer.entry-monitor-toast .toast-body {
            font-size: 1.1rem;
            padding: 1rem 1.25rem;
        }

        @media (max-width: 576px) {
            #toastContainer.entry-monitor-toast {
                width: calc(100vw - 1.5rem);
                left: 0.75rem !important;
                transform: none;
            }

            #toastContainer.entry-monitor-toast .toast {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <img class="iubat-corner-logo" src="{% static 'img/logo-iubat.png' %}" alt="IUBAT Logo">

    <main class="main-content">
        <div class="card entry-card">
            <div class="card-body p-5 text-center">
                <!-- Logo/Icon -->
                <div class="logo-wrapper">
                   <img src="{% static 'img/logo.png' %}" alt="Library Logo" style="width: 100%; height: auto;">
                </div>

                <h1 class="h2 fw-bold mb-3">Library Entry Station</h1>
                <p class="text-muted mb-4">
                    Scan or type your ID to enter the main library. The station will register your entry securely.
                </p>

                <form id="entryForm" method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="studentId" class="visually-hidden">Student ID</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text">
                                <i class="fas fa-id-card text-muted"></i>
                            </span>
                            <input type="hidden" id="service-type" name="service_type" value="library">
                            <input type="text" 
                                   class="form-control" 
                                   id="studentId" 
                                   name="student_id"
                                   placeholder="Enter Student or Faculty ID" 
                                   required 
                                   autofocus 
                                   autocomplete="off"
                                   spellcheck="false">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>
                            Enter/Exit Library
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div class="modal fade" id="entryRegistrationModal" tabindex="-1" aria-labelledby="entryRegistrationModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="entryRegistrationModalLabel">
                        <i class="fas fa-user-plus me-2"></i>Quick Registration
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="entryRegistrationForm" novalidate>
                    <div class="modal-body">
                        <p class="text-muted mb-3">ID was not found. Register this user to continue entry.</p>
                        <div class="mb-3">
                            <label for="registrationStudentIdDisplay" class="form-label">ID</label>
                            <input type="text" class="form-control" id="registrationStudentIdDisplay" readonly>
                            <input type="hidden" id="registrationStudentId" name="student_id">
                        </div>
                        <div class="mb-3">
                            <label for="registrationName" class="form-label">Name</label>
                            <input type="text" class="form-control" id="registrationName" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="registrationEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="registrationEmail" name="email" required>
                        </div>
                        <div class="mb-0">
                            <label for="registrationDepartment" class="form-label">Department</label>
                            <select class="form-select" id="registrationDepartment" name="department_id" required>
                                <option value="">Select Department</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="entryRegistrationSubmitBtn">
                            <i class="fas fa-save me-2"></i>Register & Continue
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    {% include "utils/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'js/axios.min.js' %}"></script>
    <script src="{% static 'js/custom.js' %}"></script>
</body>
</html>
