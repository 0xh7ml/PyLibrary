{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ APP_NAME }} - Entry Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .entry-card {
            max-width: 500px;
            width: 100%;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
        }

        .logo-wrapper {
            width: 80px;
            height: 80px;
            /* background: linear-gradient(135deg, #007bff, #0056b3); */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: white;
            font-size: 2rem;
        }

        .form-control-lg {
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 1px;
        }

        /* Toast customizations */
        .toast {
            min-width: 300px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        .toast-body {
            font-size: 0.95rem;
            line-height: 1.4;
        }

        @media (max-width: 576px) {
            .entry-card {
                margin: 1rem;
            }
            
            .toast {
                min-width: 280px;
            }
        }
    </style>
</head>
<body>
    <!-- Bootstrap Dark Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fas fa-book-open-reader me-2"></i>
                IUBAT Library
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="{% url 'entry_monitor' %}">Entry Monitor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'service_monitor' %}">Service Monitor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/">Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="card entry-card">
            <div class="card-body p-5 text-center">
                <!-- Logo/Icon -->
                <div class="logo-wrapper">
                   <img src="{% static 'img/logo-iubat.png' %}" alt="Library Logo" style="width: 100%; height: auto;">
                </div>

                <h1 class="h2 fw-bold mb-3">Library Entry Station</h1>
                <p class="text-muted mb-4">
                    Scan or type your ID to enter the main library. The station will register your entry securely.
                </p>

                <form id="entryForm" method="POST">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="studentId" class="visually-hidden">Student ID</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text">
                                <i class="fas fa-id-card text-muted"></i>
                            </span>
                            <input type="text" 
                                   class="form-control" 
                                   id="studentId" 
                                   name="student_id"
                                   placeholder="Enter Student or Faculty ID" 
                                   required 
                                   autofocus 
                                   autocomplete="off"
                                   spellcheck="false">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>
                            Enter/Exit Library
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
        <div id="mainToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium" id="toastMessage">
                    <!-- Toast message will be inserted here -->
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{% static 'js/axios.min.js' %}"></script>

    <script>
        // Toast notification function
        function showMessage(message, type = 'success') {
            const toastElement = document.getElementById('mainToast');
            const toastBody = document.getElementById('toastMessage');
            
            // Set toast message
            toastBody.innerHTML = `<i class="fas ${getToastIcon(type)} me-2"></i>${message}`;
            
            // Set toast color based on type
            toastElement.className = `toast align-items-center border-0 text-white ${getToastClass(type)}`;
            
            // Show toast
            const toast = new bootstrap.Toast(toastElement, {
                autohide: true,
                delay: type === 'error' ? 5000 : 3000
            });
            toast.show();
        }

        function getToastClass(type) {
            switch(type) {
                case 'success': return 'bg-success';
                case 'error': return 'bg-danger';
                case 'warning': return 'bg-warning text-dark';
                case 'info': return 'bg-info';
                default: return 'bg-primary';
            }
        }

        function getToastIcon(type) {
            switch(type) {
                case 'success': return 'fa-check-circle';
                case 'error': return 'fa-exclamation-circle';
                case 'warning': return 'fa-exclamation-triangle';
                case 'info': return 'fa-info-circle';
                default: return 'fa-bell';
            }
        }

        // Get CSRF token from meta tag or cookie
        function getCSRFToken() {
            const token = document.querySelector('[name=csrfmiddlewaretoken]').value;
            return token;
        }

        // Barcode scanning optimizations
        function optimizeForBarcode() {
            const input = document.getElementById('studentId');
            
            // Force focus and prevent losing focus
            input.focus();
            
            // Re-focus when clicking anywhere
            document.addEventListener('click', function() {
                setTimeout(() => input.focus(), 100);
            });
            
            // Re-focus on page visibility change
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    setTimeout(() => input.focus(), 100);
                }
            });
            
            // Handle rapid input (typical of barcode scanners)
            let inputBuffer = '';
            let inputTimeout;
            
            input.addEventListener('input', function(e) {
                clearTimeout(inputTimeout);
                inputBuffer += e.data || '';
                
                // If input seems to be from a barcode scanner (rapid input)
                if (e.inputType === 'insertText' && inputBuffer.length > 5) {
                    inputTimeout = setTimeout(() => {
                        // Auto-submit if input looks like a complete barcode
                        if (this.value.length >= 6) {
                            document.getElementById('entryForm').dispatchEvent(new Event('submit'));
                        }
                        inputBuffer = '';
                    }, 50);
                } else {
                    // Regular typing
                    inputTimeout = setTimeout(() => {
                        inputBuffer = '';
                    }, 500);
                }
            });
            
            // Handle barcode scanner that sends Enter key
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && this.value.length >= 6) {
                    e.preventDefault();
                    document.getElementById('entryForm').dispatchEvent(new Event('submit'));
                }
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            optimizeForBarcode();
            
            // Handle form submission with axios
            document.getElementById('entryForm').addEventListener('submit', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                console.log('Form submission intercepted');
                
                const submitBtn = document.querySelector('button[type="submit"]');
                const studentIdInput = document.getElementById('studentId');
                const studentId = studentIdInput.value.trim();
                
                if (!studentId) {
                    showMessage('Please enter a valid Student/Faculty ID', 'warning');
                    studentIdInput.focus();
                    return false;
                }
                
                if (studentId.length < 6) {
                    showMessage('ID must be at least 6 characters long', 'warning');
                    studentIdInput.focus();
                    return false;
                }
                
                // Show loading state
                const originalText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Processing Entry...';
                
                // Prepare form data
                const formData = new FormData();
                formData.append('student_id', studentId);
                formData.append('csrfmiddlewaretoken', getCSRFToken());
                
                console.log('Sending axios request with student ID:', studentId);
                
                // Submit using axios
                axios.post(window.location.href, formData, {
                    headers: {
                        'X-CSRFToken': getCSRFToken(),
                        'X-Requested-With': 'XMLHttpRequest',
                        'Accept': 'application/json, text/plain, */*'
                    },
                    responseType: 'json'
                })
                .then(function(response) {
                    console.log('Response received:', response.data);
                    
                    if (response.data.success) {
                        const action = response.data.action;
                        const message = response.data.message;
                        
                        // Show appropriate success message with details
                        if (action === 'entry') {
                            showMessage(`${message} Entry time: ${response.data.entry_time}`, 'success');
                        } else if (action === 'exit') {
                            const duration = response.data.duration ? ` Duration: ${response.data.duration}` : '';
                            showMessage(`${message}${duration}`, 'info');
                        } else {
                            showMessage(message, 'success');
                        }
                        
                        // Clear form and reset
                        studentIdInput.value = '';
                        studentIdInput.focus();
                    } else {
                        showMessage(response.data.message || `Error processing entry for ID: ${studentId}`, 'error');
                        studentIdInput.select();
                    }
                })
                .catch(function(error) {
                    console.error('Entry error:', error);
                    if (error.response && error.response.data && error.response.data.message) {
                        showMessage(error.response.data.message, 'error');
                    } else {
                        showMessage(`Error processing entry for ID: ${studentId}. Please try again.`, 'error');
                    }
                    studentIdInput.select();
                })
                .finally(function() {
                    // Reset button state
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                });
            });
            
            // Ensure input stays focused
            setInterval(() => {
                const input = document.getElementById('studentId');
                if (document.activeElement !== input && document.hasFocus()) {
                    input.focus();
                }
            }, 1000);
        });
        
        // Handle page focus
        window.addEventListener('focus', function() {
            setTimeout(() => {
                document.getElementById('studentId').focus();
            }, 100);
        });
    </script>
</body>
</html>
