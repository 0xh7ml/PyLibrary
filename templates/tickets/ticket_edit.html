{% extends "base.html" %}

{% block title %}Tickets - Edit Ticket{% endblock %}

{% block content_header %}
    Edit Ticket
{% endblock content_header %}

{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
<li class="breadcrumb-item active">Edit Ticket</li>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{% url 'ticket_edit' ticket.id %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="issue_type" class="form-label">Issue Type</label>
                        <select class="form-select" id="issue_type" name="issue_type" required>
                            <option value="">Select Issue Type</option>
                            <option value="pc_issue" {% if ticket.issue_type == "pc_issue" %}selected{% endif %}>PC Issue</option>
                            <option value="facility_issue" {% if ticket.issue_type == "facility_issue" %}selected{% endif %}>Facility Issue</option>
                            <option value="other_issue" {% if ticket.issue_type == "other_issue" %}selected{% endif %}>Other Issue</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="status" class="form-label">Status</label>
                        <select class="form-select" id="status" name="status" required>
                            <option value="">Select Status</option>
                            <option value="open" {% if ticket.status == "open" %}selected{% endif %}>Open</option>
                            <option value="in_progress" {% if ticket.status == "in_progress" %}selected{% endif %}>In Progress</option>
                            <option value="resolved" {% if ticket.status == "resolved" %}selected{% endif %}>Resolved</option>
                            <option value="closed" {% if ticket.status == "closed" %}selected{% endif %}>Closed</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" required>{{ ticket.description }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                    <a href="{% url 'ticket_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
