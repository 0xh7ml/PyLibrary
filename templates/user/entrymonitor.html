
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUBAT Library Digital Entry-Exit System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- 1. General & Theming (IUBAT Branding) --- */
        :root {
            --iubat-green: #005C2B; /* Professional green from the logo */
            --iubat-green-hover: #004C22; /* Darker green for hover */
            --bg-color: #F8F9FA; /* Clean, light academic background */
            --card-bg: #FFFFFF;
            --heading-text: #212529; /* Standard dark text */
            --body-text: #495057;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 2. Animations --- */
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* --- 3. Header --- */
        .header {
            background-color: var(--card-bg);
            border-bottom: 1px solid #dee2e6;
        }

        .header .navbar-brand {
            color: var(--heading-text);
            font-weight: 600;
        }

        .header .admin-links a {
            color: var(--body-text);
            text-decoration: none;
            padding: 0 0.75rem;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .header .admin-links a:hover {
            color: var(--iubat-green);
        }
        
        .header .admin-links a:not(:last-child) {
            border-right: 1px solid #e9ecef;
        }

        /* --- 4. Login Card --- */
        .login-card {
            max-width: 450px;
            width: 100%;
            border: none;
            border-radius: 0.75rem;
            background-color: var(--card-bg);
            animation: fadeInSlideUp 0.8s ease-out forwards;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.05);
        }
        
        .login-card .card-body h1 {
            color: var(--heading-text);
        }

        .login-card .card-body p {
            color: var(--body-text);
        }

        /* --- 5. Logo --- */
        .iubat-logo {
            max-width: 150px; /* Adjusted for better scale */
            height: auto;
            display: block;
            margin: 0 auto 1.5rem auto;
        }

        /* --- 6. Form Elements --- */
        .form-control {
            background-color: #F8F9FA;
            border: 1px solid #DDE1E4;
            color: var(--heading-text);
            transition: all 0.3s ease;
        }

        .form-control::placeholder { color: #A0AEC0; }
        
        .form-control:focus {
            background-color: #fff;
            color: var(--heading-text);
            border-color: var(--iubat-green);
            box-shadow: 0 0 0 0.25rem rgba(0, 92, 43, 0.2);
        }

        /* Button with IUBAT Branding */
        .btn-primary {
            background-color: var(--iubat-green);
            border-color: var(--iubat-green);
            padding: 0.75rem;
            font-weight: 600;
            transition: transform 0.2s ease-out, box-shadow 0.2s ease-out, background-color 0.2s ease-in-out;
        }

        .btn-primary:hover {
            background-color: var(--iubat-green-hover);
            border-color: var(--iubat-green-hover);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

    </style>
</head>
<body>
    {% load static %}
    <header class="header p-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="#" class="navbar-brand">
                <i class="fa-solid fa-book-open-reader me-2"></i>IUBAT Library
            </a>
            <div class="admin-links d-none d-sm-block">
                <a href="#">Entry Monitor</a>
                <a href="#">Service Monitor</a>
                <a href="#">Admin</a>
            </div>
        </div>
    </header>

    <main class="main-content container d-flex align-items-center justify-content-center flex-grow-1">
        <div class="card login-card p-4 p-md-5">
            <div class="card-body text-center">

                <img src="{% static 'img/Iubat-logo.png' %}" alt="IUBAT University Logo" class="iubat-logo">

                <h1 class="h3 fw-bold mb-2">Library Digital Entry System</h1>
                <p class="mb-4">
                    Please scan or enter your ID to enter the main library.
                </p>

                <form id="entryForm" method="POST">
                    <div class="mb-4">
                        <label for="studentId" class="visually-hidden">Student ID</label>
                        <div class="input-group">
                           <span class="input-group-text bg-light border-end-0">
                                <i class="fa-solid fa-id-card text-muted"></i>
                           </span>
                            <input type="text" class="form-control form-control-lg border-start-0" id="studentId" placeholder="Enter Student ID" required autofocus aria-label="Enter Student ID">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Enter Library</button>
                    </div>
                </form>

            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // --- Essential Fix for Scanner/Enter Key Usage ---
        // This prevents the form from submitting when the 'Enter' key is pressed 
        // (which is often the final output of a barcode scanner).
        // This forces the user (or the system) to explicitly click the "Enter Library" button.
        document.getElementById('entryForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });

        // Ensure the input field is focused immediately on page load,
        // which is crucial for quick use with a scanner.
        document.addEventListener('DOMContentLoaded', (event) => {
            document.getElementById('studentId').focus();
        });
    </script>
</body>
</html>
