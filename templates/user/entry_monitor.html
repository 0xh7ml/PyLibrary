{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUBAT Library Digital Entry System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Inlined user CSS (previously static/css/user.css) -->
    <style>
    /* --- Theme: Clean, Modern Dashboard with High Contrast & Data Viz Accents --- */

    :root {
        /* Palette provided by user */
        --sidebar-bg: #222B45; /* Sidebar/Primary Dark BG */
        --main-bg: #F8F9FA;    /* Main Background */
        --card-bg: #FFFFFF;    /* Card/Surface */
        --text-dark: #343A40;  /* Primary text */
        --text-muted: #6C757D; /* Muted text */
        --accent: #8F66F4;     /* Accent / Data Viz */
        --iubat-green: #005C2B;/* IUBAT Primary Action */
        --iubat-green-hover: #004C22;
        --radius: 10px;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background-color: var(--main-bg);
        color: var(--text-dark);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    @keyframes fadeInSlideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Navbar: pill-style, centered, with subtle backdrop */
    .header {
        background: var(--sidebar-bg);
        color: #fff;
        box-shadow: 0 6px 20px rgba(34, 43, 69, 0.12);
        position: sticky;
        top: 0;
        z-index: 40;
    }

    .header .navbar-brand { font-weight: 700; font-size: 1.125rem; color: #fff; }

    .nav-pill {
        display: inline-flex;
        gap: 0.5rem;
        background: rgba(255,255,255,0.04);
        padding: 0.25rem;
        border-radius: 999px;
        align-items: center;
    }

    .nav-pill a {
        color: rgba(255,255,255,0.85);
        padding: 0.45rem 0.9rem;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
        transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-pill a:hover { color: #fff; background: rgba(255,255,255,0.06); transform: translateY(-2px); }

    .nav-pill a.active-link { color: var(--accent); background: rgba(143,102,244,0.12); box-shadow: 0 4px 14px rgba(143,102,244,0.06); }

    .login-card {
        max-width: 520px;
        width: 100%;
        border-radius: var(--radius);
        background: var(--card-bg);
        animation: fadeInSlideUp 0.8s ease-out forwards;
        box-shadow: 0 12px 30px rgba(34,43,69,0.08);
        border: 1px solid rgba(34,43,69,0.04);
    }
    .login-card .card-body { padding: 2.25rem; }

    .iubat-logo-wrapper { display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem auto; width:72px; height:72px; border-radius:12px; background: linear-gradient(180deg, rgba(143,102,244,0.08), rgba(143,102,244,0.03)); box-shadow: 0 4px 12px rgba(143,102,244,0.06); }
    .iubat-logo { max-width:60px; height:auto; }

    .form-control { background-color:#fff; border:1px solid rgba(34,43,69,0.08); color:var(--text-dark); padding:0.75rem 1rem; font-size:1rem; transition:all 0.18s ease; }
    .form-control:focus { outline: none; box-shadow: 0 6px 20px rgba(143,102,244,0.08); border-color: var(--accent); transform: translateY(-1px); }
    .form-control::placeholder { color: var(--text-muted); }

    .btn-primary { background-color:var(--iubat-green); border-color:var(--iubat-green); padding:0.75rem 1.25rem; font-weight:700; font-size:1rem; border-radius:8px; letter-spacing:0.25px; box-shadow: 0 6px 20px rgba(0,92,43,0.18); transition: transform .15s ease, box-shadow .2s ease; }
    .btn-primary:hover { background-color: var(--iubat-green-hover); transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,92,43,0.18); }

    @media (max-width: 576px) { .login-card { margin: 1rem; border-radius: 8px; } .btn-primary { font-size: 0.98rem; padding: 0.6rem 1rem; } }
    </style>
</head>
<body>
    <header class="header p-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="#" class="navbar-brand">
                <i class="fa-solid fa-book-open-reader me-2"></i>IUBAT Library
            </a>
            <div class="admin-links d-none d-sm-block">
                <a href="#" class="active-link">Entry Monitor</a> 
                <a href="#">Service Monitor</a>
                <a href="#">Admin</a>
            </div>
        </div>
    </header>

    <main class="main-content container d-flex align-items-center justify-content-center flex-grow-1">
        <div class="card login-card p-4 p-md-5">
            <div class="card-body text-center">

                <div class="iubat-logo-wrapper">
                    <img src="{% static 'img/Iubat-logo.png' %}" alt="IUBAT University Logo" class="iubat-logo">
                </div>

                <h1 class="h3 fw-bold mb-2">Library Digital Entry System</h1>
                <p class="mb-4">
                    Please scan or enter your ID to Enter the Main Library.
                </p>

                <form id="entryForm" method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="studentId" class="visually-hidden">StudentID</label>
                        <div class="input-group">
                           <span class="input-group-text border-end-0">
                                <i class="fa-solid fa-id-card text-muted"></i>
                           </span>
                            <input type="text" class="form-control form-control-lg border-start-0" id="studentId" placeholder="Enter Student ID" required autofocus aria-label="Enter Student or Faculty ID">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Enter Library</button>
                    </div>
                </form>

            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // --- Essential Fix for Scanner/Enter Key Usage ---
        // Prevents scanner's final 'Enter' output from prematurely submitting the form.
        document.getElementById('entryForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });

        // Ensure the input field is focused immediately on page load,
        // which is crucial for quick use with a scanner.
        document.addEventListener('DOMContentLoaded', (event) => {
            document.getElementById('studentId').focus();
        });
    </script>
</body>
</html>
