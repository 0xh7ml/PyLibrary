<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IUBAT Library Service & Exit Monitor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/user.css' %}">
    </head>
<body>
    {% load static %}
    <header class="header p-3">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <a href="#" class="navbar-brand">
                <i class="fa-solid fa-book-open-reader me-2"></i>IUBAT Library
            </a>
            <div class="admin-links d-none d-sm-block">
                <a href="#">Entry Monitor</a>
                <a href="#" class="active-link">Service Monitor</a> 
                <a href="#">Admin</a>
            </div>
        </div>
    </header>

    <main class="main-content container d-flex align-items-center justify-content-center flex-grow-1">
        <div class="card login-card p-4 p-md-5">
            <div class="card-body text-center">

                <div class="service-icon"><i class="fa-solid fa-barcode"></i></div>

                <h1 class="h3 fw-bold mb-2">E-Library & Exit Station</h1>
                <p class="mb-4">
                    Scan your ID to Exit the Library or Access Services.
                </p>

                <form id="serviceForm" method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="studentId" class="visually-hidden">Student/Faculty ID</label>
                        <div class="input-group">
                           <span class="input-group-text border-end-0">
                                <i class="fa-solid fa-id-card text-muted"></i>
                           </span>
                             <input type="text" class="form-control form-control-lg border-start-0" id="studentId" placeholder="Enter Student/Faculty ID" required autofocus aria-label="Enter Student or Faculty ID">
                        </div>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Access Services / Exit</button>
                    </div>
                </form>

            </div>
        </div>
    </main>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        
        document.getElementById('serviceForm').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
            }
        });

        document.addEventListener('DOMContentLoaded', (event) => {
            document.getElementById('studentId').focus();
        });
    </script>
</body>
</html>
